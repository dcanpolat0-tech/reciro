services:
  - type: web
    name: nereye-receipt-analysis
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run backend:start
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: ANALYSIS_CLIENT_TOKEN
        sync: false
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "20"
